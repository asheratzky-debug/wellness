name: 📊 Weekly Analytics Report

on:
  schedule:
    # Every Monday at 08:00 Israel time (UTC+3 in summer → 05:00 UTC)
    - cron: '0 5 * * 1'
  workflow_dispatch: # Allow manual trigger anytime

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Generate & post weekly report
        uses: actions/github-script@v7
        with:
          script: |
            // ── Date range: last 7 days ───────────────────────────────────
            const now  = new Date();
            const from = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            const fmt = (d) => d.toLocaleDateString('he-IL', { day: 'numeric', month: 'numeric', timeZone: 'Asia/Jerusalem' });
            const fromStr = fmt(from);
            const toStr   = fmt(now);

            // ── GitHub activity for this repo ─────────────────────────────
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const since = from.toISOString();

            const [commitsRes, issuesOpenedRes, issuesClosedRes] = await Promise.all([
              github.rest.repos.listCommits({ owner, repo, since, per_page: 100 }),
              github.rest.issues.listForRepo({ owner, repo, state: 'open',   since, per_page: 100 }),
              github.rest.issues.listForRepo({ owner, repo, state: 'closed', since, per_page: 100 }),
            ]);

            const commits       = commitsRes.data.length;
            const issuesOpened  = issuesOpenedRes.data.filter(i => !i.pull_request).length;
            const issuesClosed  = issuesClosedRes.data.filter(i => !i.pull_request).length;

            // ── Build markdown report ─────────────────────────────────────
            let md = `# 📊 דוח שבועי — Wellness App\n`;
            md += `**תקופה:** ${fromStr} – ${toStr}\n\n`;
            md += `---\n\n`;

            md += `## 📈 נתוני שימוש\n\n`;
            md += `לצפייה בנתוני מבקרים, עמודים, מכשירים ומדינות:\n\n`;
            md += `👉 **[פתח את Vercel Analytics Dashboard](https://vercel.com/dashboard)**\n\n`;
            md += `---\n\n`;

            md += `## 🛠️ פעילות פיתוח השבוע\n\n`;
            md += `| מדד | ערך |\n|-----|-----|\n`;
            md += `| 📝 Commits | **${commits}** |\n`;
            md += `| 🐛 Issues שנפתחו | **${issuesOpened}** |\n`;
            md += `| ✅ Issues שנסגרו | **${issuesClosed}** |\n`;
            md += `\n`;

            if (commits > 0) {
              const recentCommits = commitsRes.data.slice(0, 5);
              md += `### 5 ה-Commits האחרונים\n\n`;
              for (const c of recentCommits) {
                const msg   = c.commit.message.split('\n')[0].slice(0, 72);
                const short = c.sha.slice(0, 7);
                md += `- [\`${short}\`](${c.html_url}) ${msg}\n`;
              }
              md += `\n`;
            }

            md += `---\n`;
            md += `*נוצר אוטומטית ע"י GitHub Actions*\n`;

            // ── Close old issues & create new one ─────────────────────────
            const existing = await github.rest.issues.listForRepo({
              owner, repo, labels: ['analytics'], state: 'open',
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed' });
            }

            const created = await github.rest.issues.create({
              owner, repo,
              title:  `📊 דוח שבועי – ${toStr}`,
              body:   md,
              labels: ['analytics'],
            });

            console.log(`Report created: ${created.data.html_url}`);
